# --- INDICATOR INPUTS FOR LIGHTGBM V4 ---

# Core First-Principle Features (The "Physics" of the move)
primary_features:
  - "market_energy"            # 0-100 Intensity (Volatility/Momentum)
  - "energy_slope"             # Rate of change in market energy
  - "mpo"                      # Market Pressure Oscillator (Trend Intensity)
  - "mpo_bias"                 # Directional structural bias
  - "compression_index"        # Price coiling vs. expansion state

# Directional Logic (CRITICAL FOR V4)
# This tells the AI if it's looking at a "Retail Buy Attempt" or "Retail Sell Attempt"
direction_logic:
  - "side"                     # 1 = Retail Buying, 0 = Retail Selling

# Contextual Retail "Noise" Features (To find where the crowd gets trapped)
retail_features:
  - "rsi_14"                   # Momentum exhaustion indicator
  - "atr_ratio"                # Current ATR vs. 20-period average ATR
  - "bb_width"                 # Bollinger Band width (volatility cycle)
  - "candle_body_ratio"        # Price action signature (Body vs. Wicks)

# Time-Based Features (Gold's specific liquidity cycles)
session_features:
  - "hour_of_day"              # 0-23 Hour
  - "is_ny_open"               # 1 during NY Session peak (13:00 - 17:00 UTC)