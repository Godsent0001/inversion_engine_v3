# --- GLOBAL ENGINE SETTINGS ---
project_name: "Inversion Engine v3"
symbol: "XAUUSD"
timeframe: "5m"

# --- MINING PARAMETERS ---
lookback_months: 6             # The 6-month "Goldilocks" training window
train_test_split: 0.85         # 85% Train (5.1 months), 15% OOS Test (0.9 months)
random_candidate_count: 3000   # Randomly sampled candles per month for diversity

# --- EXECUTION & RISK ---
risk_per_trade_percent: 1.0    # 1% Risk per trade
account_buffer_r: 30.0         # Your 30% drawdown "War Chest"
max_strategy_drawdown: 12.0    # The 12R "Firing" Limit (Monte Carlo Cap)
portfolio_size: 30             # Total number of uncorrelated "Experts"

# --- THE SPREAD TAX (XAUUSD 5m) ---
# We subtract this from every trade outcome to ensure real-world viability
spread_tax_r: 0.05             # Average spread + slippage in R-multiples

# --- TARGETS ---
min_trades_per_month: 100      # Strategy must fire 100x/mo to be hired
min_inverted_alpha_r: 0.10     # Min net profit per trade after spread tax